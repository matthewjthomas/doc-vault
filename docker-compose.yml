services:
  docvault:
    build: .
    container_name: docvault
    ports:
      - "5050:5000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme}
      - MAX_UPLOAD_MB=50
      # Set AUTH_BYPASS=true to skip Tailscale auth (for development)
      - AUTH_BYPASS=true
    restart: unless-stopped
